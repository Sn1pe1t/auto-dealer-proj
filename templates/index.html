<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Система автосалона</title>
</head>

<body class="bg-light">
    <div class="container-fluid py-4">
        <ul class="nav nav-tabs mb-4" id="mainTab">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#sale">Оформление заказа</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#history">Заказы и отчёты</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="sale">
                <div class="row">
                    <div class="col-md-3">
                        <div class="card p-3 shadow-sm">
                            <h5>Фильтры</h5>
                            <select class="form-select mb-2" id="catFilter">
                                <option value="">Все категории</option>
                                {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor
                                %}
                            </select>
                            <input type="number" class="form-control mb-2" placeholder="Мин. мощность">
                            <button class="btn btn-primary w-100">Применить</button>
                        </div>
                    </div>
                    <div class="col-md-9">
                        <div class="row">
                            {% for car in cars %}
                            <div class="col-md-4 mb-3">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <h6>{{ car.brand }} {{ car.model }}</h6>
                                        <p class="small text-muted">{{ car.year }} г. | {{ car.price }} руб.</p>
                                        <form action="/sell" method="POST">
                                            <input type="hidden" name="car_id" value="{{ car.id }}">
                                            <input type="number" name="quantity" class="form-control mb-2" value="1">
                                            <button type="submit" class="btn btn-sm btn-success">В корзину</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="history">
                <div class="card p-4">
                    <h3>История заказов</h3>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>№</th>
                                <th>Дата</th>
                                <th>Клиент</th>
                                <th>Сумма</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
