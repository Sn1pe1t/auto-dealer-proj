<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосалон CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #111827;
            padding: 20px;
            border-right: 1px solid #1f2937;
            overflow-y: auto;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 70px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: #0f172a;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tab-buttons button {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 12px 0;
            font-size: 16px;
            width: 100%;
            text-align: left;
            font-weight: 500;
        }

        .tab-buttons button.active {
            color: #22c55e;
            border-left: 3px solid #22c55e;
            padding-left: 15px;
        }

        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .car-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.2s;
        }

        .car-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .price {
            color: #22c55e;
            font-size: 22px;
            font-weight: 700;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-secondary {
            background: #334155;
            color: white;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-warning {
            background: #eab308;
            color: black;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .cart-item {
            background: #334155;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #94a3b8;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #0f172a;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #0f172a;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            padding: 25px;
        }

        .modal-content.large {
            max-width: 900px;
        }

        .close {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }

        h3,
        h2 {
            margin-bottom: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .welcome {
            font-size: 14px;
            color: #94a3b8;
        }

        .username {
            font-weight: 600;
            color: white;
        }

        .today-sales {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .today-sales .amount {
            font-size: 32px;
            font-weight: bold;
            color: #22c55e;
        }
        .today-sales .count {
            font-size: 18px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2 style="margin-bottom:30px;">🚗 Автосалон</h2>
        <div id="tab-buttons-container" class="tab-buttons"></div>
    </div>
    <div class="content">
        <div class="topbar">
            <h3 id="tab-title">Новый заказ</h3>
            <div class="user-info" id="user-info"></div>
        </div>
        <div class="main" id="tab-content"></div>
    </div>

    <script>
        let state = { cars: [], customers: [], employees: [], filters: {}, cart: [] };
        let currentUser = { authenticated: false, role: null, username: null };
        let activeTab = 0;

        async function fetchJSON(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function checkAuth() {
            try {
                const data = await fetchJSON('/api/current_user');
                currentUser = data;
                renderUserInfo();
                buildSidebarTabs();
                if (currentUser.authenticated) {
                    await loadAllData();
                    renderTab(activeTab);
                } else {
                    showAuthModal();
                }
            } catch (e) { console.error(e); }
        }

        function renderUserInfo() {
            const container = document.getElementById('user-info');
            if (currentUser.authenticated) {
                let roleName = '';
                if (currentUser.role === 'manager') roleName = 'Менеджер';
                else if (currentUser.role === 'senior_manager') roleName = 'Старший менеджер';
                else if (currentUser.role === 'owner') roleName = 'Владелец';
                else roleName = 'Клиент';
                container.innerHTML = `
                <div class="welcome">Добро пожаловать, <span class="username">${currentUser.username}</span> (${roleName})</div>
                <button class="btn btn-secondary" onclick="logout()">Выйти</button>
            `;
            } else {
                container.innerHTML = `<button class="btn btn-primary" onclick="showAuthModal()">Войти</button>`;
            }
        }

        function buildSidebarTabs() {
                const container = document.getElementById('tab-buttons-container');
                let buttonsHtml = '';
                if (!currentUser.authenticated) {
                    buttonsHtml = `<button data-tab="0" class="active">📦 Новый заказ</button><br><br>
                       <button data-tab="4">🏆 Топ продаж</button><br><br>`;
                } else if (currentUser.role === 'owner') {
                    buttonsHtml = `<button data-tab="0" class="active">📦 Новый заказ</button><br><br>
                       <button data-tab="1">📜 История заказов</button><br><br>
                       <button data-tab="2">📊 Отчёты</button><br><br>
                       <button data-tab="4">🏆 Топ продаж</button><br><br>
                       <button data-tab="5">👥 Управление персоналом</button><br><br>
                       <button data-tab="6">👤 Профиль</button><br><br>`;
                } else if (currentUser.role === 'senior_manager') {
                    buttonsHtml = `<button data-tab="0" class="active">📦 Новый заказ</button><br><br>
                       <button data-tab="1">📜 История заказов</button><br><br>
                       <button data-tab="2">📊 Отчёты</button><br><br>
                       <button data-tab="4">🏆 Топ продаж</button><br><br>
                       <button data-tab="5">👥 Управление персоналом</button><br><br>
                       <button data-tab="6">👤 Профиль</button><br><br>`;
                } else if (currentUser.role === 'manager') {
                    buttonsHtml = `<button data-tab="0" class="active">📦 Новый заказ</button><br><br>
                       <button data-tab="1">📜 История заказов</button><br><br>
                       <button data-tab="2">📊 Отчёты</button><br><br>
                       <button data-tab="4">🏆 Топ продаж</button><br><br>
                       <button data-tab="6">👤 Профиль</button><br><br>`;
                } else { // user
                    buttonsHtml = `<button data-tab="0" class="active">📦 Новый заказ</button><br><br>
                       <button data-tab="1">📜 Мои заказы</button><br><br>
                       <button data-tab="4">🏆 Топ продаж</button><br><br>
                       <button data-tab="6">👤 Профиль</button><br><br>`;
                }
                container.innerHTML = buttonsHtml;
                document.querySelectorAll('#tab-buttons-container button').forEach(btn => {
                    const tabIdx = parseInt(btn.getAttribute('data-tab'));
                    btn.onclick = () => switchTab(tabIdx);
                });
            }

        async function loadAllData() {
            await loadFilters();
            await loadCustomers();
            await loadEmployees();
            if (activeTab === 0) await loadCars();
        }

        async function loadFilters() {
            const data = await fetchJSON('/api/filters');
            state.filters = data;
        }

        async function loadCars() {
            const params = new URLSearchParams();
            const catId = document.getElementById('category-filter')?.value;
            if (catId && catId !== 'all') params.append('category_id', catId);
            const stockOnly = document.getElementById('stock-only')?.checked;
            if (stockOnly) params.append('in_stock_only', 'true');
            const steering = document.getElementById('steering-filter')?.value;
            if (steering && steering !== 'all') params.append('steering', steering);
            const powerFrom = document.getElementById('power-from')?.value;
            if (powerFrom && powerFrom !== '') params.append('power_from', powerFrom);
            const powerTo = document.getElementById('power-to')?.value;
            if (powerTo && powerTo !== '') params.append('power_to', powerTo);
            const fuel = document.getElementById('fuel-filter')?.value;
            if (fuel && fuel !== 'all') params.append('fuel', fuel);
            const trans = document.getElementById('trans-filter')?.value;
            if (trans && trans !== 'all') params.append('transmission', trans);
            const drive = document.getElementById('drive-filter')?.value;
            if (drive && drive !== 'all') params.append('drive', drive);
            const cond = document.getElementById('condition-filter')?.value;
            if (cond && cond !== 'all') params.append('condition', cond);
            try {
                state.cars = await fetchJSON(`/api/cars?${params.toString()}`);
                renderCars();
            } catch (e) { console.error(e); }
        }

        function renderCars() {
            const grid = document.getElementById('car-grid');
            if (!grid) return;
            if (state.cars.length === 0) {
                grid.innerHTML = '<div class="card">Автомобили не найдены</div>';
                return;
            }
            grid.innerHTML = state.cars.map(car => {
                const condText = translateCondition(car.condition_name);
                return `
                <div class="car-card">
                    <div style="padding:16px">
                        <div style="font-weight:600;font-size:18px;">${car.brand} ${car.model}</div>
                        <div>${car.year} • ${car.power || '?'} л.с. • ${condText}</div>
                        <div class="price">${Number(car.price).toLocaleString('ru-RU')} ₽</div>
                        <div style="color:#94a3b8;">В наличии: ${car.quantity}</div>
                        <button onclick="addToCart(${car.id})" class="btn btn-success" style="width:100%;margin-top:10px;">Добавить в корзину</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        async function loadCustomers() {
            if (!currentUser.authenticated) return;
            const data = await fetchJSON('/api/customers');
            state.customers = data;
            const select = document.getElementById('customer-select');
            if (select) {
                select.innerHTML = state.customers.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
            }
        }

        async function loadEmployees() {
            if (!currentUser.authenticated) return;
            const data = await fetchJSON('/api/employees');
            state.employees = data;
            const select = document.getElementById('employee-select');
            if (select) {
                select.innerHTML = state.employees.map(e => `<option value="${e.id}">${e.name} ${e.surname}</option>`).join('');
            }
        }

        function translateCondition(condName) {
            const map = { 'new': 'Новый', 'used': 'С пробегом', 'damaged': 'Повреждён', 'restored': 'Восстановлен' };
            return map[condName] || condName;
        }

        function addToCart(carId) {
            const car = state.cars.find(c => c.id === carId);
            if (!car) return;
            const existing = state.cart.find(i => i.id === carId);
            if (existing) existing.quantity += 1;
            else state.cart.push({ id: car.id, brand: car.brand, model: car.model, price_at_sale: car.price, quantity: 1, in_stock: car.quantity > 0 });
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            if (!container) return;
            let total = 0;
            container.innerHTML = state.cart.map((item, idx) => {
                const sum = item.price_at_sale * item.quantity;
                total += sum;
                return `<div class="cart-item">${item.brand} ${item.model} × ${item.quantity} = ${sum.toLocaleString('ru-RU')} ₽ <button onclick="removeFromCart(${idx})" style="float:right;color:red;">✕</button></div>`;
            }).join('');
            document.getElementById('total-amount').textContent = total.toLocaleString('ru-RU') + ' ₽';
        }

        function removeFromCart(idx) { state.cart.splice(idx, 1); updateCartUI(); }

        async function finalizeOrder() {
                if (!currentUser.authenticated) { showAuthModal(); return; }
                if (state.cart.length === 0) return alert('Корзина пуста');
                const employeeId = document.getElementById('employee-select')?.value;
                if (!employeeId) return alert('Выберите менеджера');
                const body = { cart: state.cart, id_employee: parseInt(employeeId) };
                // Для менеджеров и владельца добавляем выбранного клиента
                if (currentUser.role !== 'user') {
                    const customerId = document.getElementById('customer-select')?.value;
                    if (!customerId) return alert('Выберите клиента');
                    body.id_customer = parseInt(customerId);
                }
                const res = await fetch('/api/finalize_sale', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    alert(`Заказ №${data.sale_id} оформлен!`);
                    state.cart = [];
                    updateCartUI();
                    loadSales();
                    loadCars();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            }

        async function loadSales() {
            if (!currentUser.authenticated) return;
            const sales = await fetchJSON('/api/sales');
            const container = document.getElementById('sales-list');
            if (!container) return;
            if (sales.length === 0) { container.innerHTML = '<div class="card">Нет продаж</div>'; return; }
            let html = `<table><thead><tr><th>№</th><th>Дата</th><th>Клиент</th><th>Менеджер</th><th>Сумма</th><th>Статус</th></tr></thead><tbody>`;
            for (const s of sales) {
                const status = s.all_in_stock === 1 ? 'Готов к выдаче' : (s.all_in_stock === 0 ? 'Предзаказ' : '—');
                html += `<tr style="cursor:pointer" onclick="showSaleDetails(${s.id})"><td>${s.id}</td><td>${s.date}</td><td>${s.customer}</td><td>${s.employee}</td><td>${Number(s.total_amount).toLocaleString('ru-RU')} ₽</td><td>${status}</td></tr>`;
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        async function showSaleDetails(saleId) {
            const details = await fetchJSON(`/api/sale_details/${saleId}`);
            let itemsHtml = `<h3>Заказ №${saleId}</h3><table><thead><tr><th>Авто</th><th>Двигатель</th><th>КПП</th><th>Привод</th><th>Кол-во</th><th>Цена</th><th>Сумма</th><th>Статус</th></tr></thead><tbody>`;
            for (const d of details) {
                const status = d.in_stock_at_sale === 1 ? 'В наличии' : 'Предзаказ';
                itemsHtml += `<tr><td>${d.brand} ${d.model} (${d.year})</td><td>${d.engine_volume || '—'} л</td><td>${d.trans_name || '—'}</td><td>${d.drive_name || '—'}</td><td>${d.quantity}</td><td>${Number(d.price_at_sale).toLocaleString()}</td><td>${Number(d.subtotal).toLocaleString()}</td><td>${status}</td></tr>`;
            }
            itemsHtml += `</tbody></table><button class="btn btn-secondary" onclick="this.closest('.modal').remove()">Закрыть</button>`;
            const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content large"><span class="close" onclick="this.closest('.modal').remove()">&times;</span>${itemsHtml}</div>`;
            document.body.appendChild(modal);
            modal.querySelectorAll('tr').forEach((tr, idx) => {
                if (idx > 0) tr.style.cursor = 'pointer';
                tr.ondblclick = (e) => {
                    const carId = details[idx - 1]?.id_car;
                    if (carId) showCarInfo(carId);
                };
            });
        }

        async function showCarInfo(carId) {
            const car = await fetchJSON(`/api/car/${carId}`);
            const info = `${car.brand} ${car.model}\nГод: ${car.year}\nЦвет: ${car.color}\nЦена: ${Number(car.price).toLocaleString()} ₽\nРуль: ${car.steering_name === 'left' ? 'Левый' : 'Правый'}\nМощность: ${car.power} л.с.\nДвигатель: ${car.engine_volume || '?'} л\nТопливо: ${car.fuel_name}\nКПП: ${car.trans_name}\nПривод: ${car.drive_name}\nСостояние: ${translateCondition(car.condition_name)} ${car.mileage ? `, пробег ${car.mileage} км` : ''}\nОстаток: ${car.quantity} шт.`;
            alert(info);
        }

        async function showReport() {
                const date = document.getElementById('report-date').value;
                if (!date) return alert('Введите дату');
                const data = await fetchJSON(`/api/report?date=${date}`);
                const container = document.getElementById('report-output');
                if (!data.length) {
                    container.innerHTML = '<div class="card">Нет продаж за эту дату</div>';
                    return;
                }
                let total = 0;
                let html = '<h4>Отчёт за ' + date + '</h4><table><thead><tr><th>Автомобиль</th><th>Кол-во</th><th>Выручка</th></tr></thead><tbody>';
                for (const r of data) {
                    total += r.revenue;
                    html += `<tr>
                    <td>${r.car}</td>
                    <td>${r.qty}</td>
                    <td>${Number(r.revenue).toLocaleString()} ₽</td>
                </tr>`;
                }
                html += `</tbody>
            <tfoot>
                <tr><td><strong>Итого</strong></td><td></td><td><strong>${total.toLocaleString()} ₽</strong></td></tr>
            </tfoot>
        </table>`;
                container.innerHTML = html;
            }

        async function showTopSales() {
                const data = await fetchJSON('/api/top_sales');
                const container = document.getElementById('top-sales-output');
                if (!data.length) {
                    container.innerHTML = '<div class="card">Нет данных</div>';
                    return;
                }
                let html = `
        <div class="card">
            <h3>🏆 Топ-10 продаваемых автомобилей</h3>
            <table>
                <thead>
                    <tr>
                        <th>Марка/Модель</th>
                        <th>Продано, шт</th>
                        <th>Выручка</th>
                    </tr>
                </thead>
                <tbody>
    `;
                for (const r of data) {
                    // Поля могут называться brand_model или car, total_qty или qty, total_revenue или revenue
                    const carName = r.brand_model || r.car || 'Неизвестно';
                    const qty = r.total_qty || r.qty || 0;
                    const revenue = r.total_revenue || r.revenue || 0;
                    html += `
            <tr>
                <td>${carName}</td>
                <td>${qty}</td>
                <td>${Number(revenue).toLocaleString()} ₽</td>
            </tr>
        `;
                }
                html += `
                </tbody>
            </table>
        </div>
    `;
                container.innerHTML = html;
            }

        async function showTodaySales() {
                const today = new Date().toISOString().split('T')[0];
                const dateInput = document.getElementById('report-date');
                if (dateInput) dateInput.value = today;
                // Вызываем ту же функцию, что и для ручного отчёта
                await showReport();
            }

        // Управление пользователями
        async function loadUsers() {
                const data = await fetchJSON('/api/users');
                const container = document.getElementById('users-list');
                if (!container) return;
                if (data.length === 0) { container.innerHTML = '<div class="card">Нет пользователей</div>'; return; }
                let html = '<div class="card"><h3>Управление персоналом</h3><div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Логин</th><th>Роль</th><th>Действия</th></tr></thead><tbody>';
                for (const u of data) {
                    html += `<tr>
                     <td>${u.id}</td>
                     <td>${u.username}</td>
                     <td>${u.role}</td>
                     <td>`;
                    if (currentUser.role === 'owner') {
                        if (u.role !== 'owner') {
                            if (u.role === 'user') {
                                html += `<button class="btn btn-success" onclick="setUserRole(${u.id}, 'manager')">Назначить менеджером</button> `;
                                html += `<button class="btn btn-primary" onclick="setUserRole(${u.id}, 'senior_manager')">Назначить старшим менеджером</button> `;
                            } else if (u.role === 'manager') {
                                html += `<button class="btn btn-warning" onclick="setUserRole(${u.id}, 'senior_manager')">Повысить до старшего</button> `;
                                html += `<button class="btn btn-danger" onclick="setUserRole(${u.id}, 'user')">Снять должность</button>`;
                            } else if (u.role === 'senior_manager') {
                                html += `<button class="btn btn-danger" onclick="setUserRole(${u.id}, 'user')">Снять должность</button>`;
                            }
                        } else {
                            html += `—`;
                        }
                    } else if (currentUser.role === 'senior_manager') {
                        if (u.role === 'user') {
                            html += `<button class="btn btn-success" onclick="setUserRole(${u.id}, 'manager')">Назначить менеджером</button>`;
                        } else if (u.role === 'manager') {
                            html += `<button class="btn btn-danger" onclick="setUserRole(${u.id}, 'user')">Снять должность</button>`;
                        } else {
                            html += `—`;
                        }
                    } else {
                        html += `—`;
                    }
                    html += `</td></tr>`;
                }
                html += `</tbody></table></div></div>`;
                container.innerHTML = html;
            }

        async function setUserRole(userId, role) {
            if (!confirm(`Изменить роль пользователя на "${role}"?`)) return;
            const res = await fetch(`/api/set_role/${userId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: role })
            });
            const data = await res.json();
            if (data.success) {
                alert('Роль изменена');
                loadUsers();
                if (userId === currentUser.user_id) location.reload();
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        // Профиль
        async function loadProfile() {
            const profile = await fetchJSON('/api/profile');
            const container = document.getElementById('profile-container');
            if (!container) return;
            container.innerHTML = `
            <div class="card">
                <h3>Личные данные</h3>
                <div class="filter-group"><label>Логин</label><input type="text" id="profile-username" value="${profile.username}"></div>
                <div class="filter-group"><label>Имя</label><input type="text" id="profile-firstname" value="${profile.first_name}"></div>
                <div class="filter-group"><label>Фамилия</label><input type="text" id="profile-lastname" value="${profile.last_name}"></div>
                <div class="filter-group"><label>Телефон</label><input type="text" id="profile-phone" value="${profile.phone}"></div>
                <div class="filter-group"><label>Email</label><input type="email" id="profile-email" value="${profile.email}"></div>
                <button class="btn btn-success" onclick="updateProfile()">Сохранить изменения</button>
            </div>
            <div class="card">
                <h3>Смена пароля</h3>
                <div class="filter-group"><label>Старый пароль</label><input type="password" id="old-password"></div>
                <div class="filter-group"><label>Новый пароль</label><input type="password" id="new-password"></div>
                <div class="filter-group"><label>Подтверждение</label><input type="password" id="confirm-password"></div>
                <button class="btn btn-primary" onclick="changePassword()">Сменить пароль</button>
            </div>
        `;
        }

        async function updateProfile() {
            const username = document.getElementById('profile-username').value;
            const first_name = document.getElementById('profile-firstname').value;
            const last_name = document.getElementById('profile-lastname').value;
            const phone = document.getElementById('profile-phone').value;
            const email = document.getElementById('profile-email').value;
            const res = await fetch('/api/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, first_name, last_name, phone, email })
            });
            const data = await res.json();
            if (data.success) {
                alert('Данные обновлены');
                const userData = await fetchJSON('/api/current_user');
                currentUser = userData;
                renderUserInfo();
                loadProfile();
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function changePassword() {
            const old_password = document.getElementById('old-password').value;
            const new_password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            if (new_password !== confirm) {
                alert('Новый пароль и подтверждение не совпадают');
                return;
            }
            const res = await fetch('/api/change_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_password, new_password })
            });
            const data = await res.json();
            if (data.success) {
                alert('Пароль изменён. Войдите заново.');
                logout();
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        // Рендер вкладок
        function renderTab(tabIndex) {
            const contentDiv = document.getElementById('tab-content');
            if (tabIndex === 0) {
                if (!currentUser.authenticated) { showAuthModal(); return; }
                const isManager = (currentUser.role !== 'user');
                contentDiv.innerHTML = `
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="width:280px;">
                ${isManager ? '<div class="card"><h3>Клиент</h3><select id="customer-select"></select></div>' : ''}
                <div class="card"><h3>Менеджер</h3><select id="employee-select"></select></div>
                <div class="card"><h3>Фильтры</h3>
                    <div class="filter-group"><label>Категория</label><select id="category-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.categories || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>Руль</label><select id="steering-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.steering || []).map(s => `<option value="${s}">${s === 'left' ? 'Левый' : 'Правый'}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>Мощность (л.с.)</label><input type="number" id="power-from" placeholder="от" oninput="loadCars()"> <input type="number" id="power-to" placeholder="до" style="margin-top:5px" oninput="loadCars()"></div>
                    <div class="filter-group"><label>Топливо</label><select id="fuel-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.fuel || []).map(f => `<option value="${f}">${f}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>КПП</label><select id="trans-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.transmission || []).map(t => `<option value="${t}">${t}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>Привод</label><select id="drive-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.drive || []).map(d => `<option value="${d}">${d}</option>`).join('')}</select></div>
                    <div class="filter-group"><label>Состояние</label><select id="condition-filter" onchange="loadCars()"><option value="all">Все</option>${(state.filters.condition || []).map(c => `<option value="${c}">${translateCondition(c)}</option>`).join('')}</select></div>
                    <label><input type="checkbox" id="stock-only" onchange="loadCars()"> Только в наличии</label>
                    <button class="btn btn-success" style="margin-top:15px; width:100%" onclick="loadCars()">Применить</button>
                </div>
            </div>
            <div style="flex:1;"><h2>Автомобили</h2><div id="car-grid" class="car-grid"></div></div>
            <div style="width:380px;"><div class="card"><h3>Корзина</h3><div id="cart-items"></div><div class="price" id="total-amount" style="margin:15px 0;">0 ₽</div><button class="btn btn-success" style="width:100%;padding:16px;" onclick="finalizeOrder()">Оформить заказ</button></div></div>
        </div>
    `;
                // Загружаем список клиентов только если нужно
                if (isManager) {
                    fetchJSON('/api/customers').then(data => {
                        const select = document.getElementById('customer-select');
                        if (select) select.innerHTML = data.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
                    });
                }
                // Загружаем список сотрудников (менеджеров)
                fetchJSON('/api/employees').then(data => {
                    state.employees = data;
                    const select = document.getElementById('employee-select');
                    if (select) select.innerHTML = data.map(e => `<option value="${e.id}">${e.name} ${e.surname}</option>`).join('');
                });
                loadCars();
                updateCartUI();
            }
            else if (tabIndex === 1) {
                contentDiv.innerHTML = `<div class="card"><h2>${currentUser.role === 'manager' || currentUser.role === 'senior_manager' || currentUser.role === 'owner' ? 'История заказов' : 'Мои заказы'}</h2><div id="sales-list"></div></div>`;
                loadSales();
            }
            else if (tabIndex === 2 && (currentUser.role === 'manager' || currentUser.role === 'senior_manager' || currentUser.role === 'owner')) {
                contentDiv.innerHTML = `
        <div class="card">
            <h3>Отчёты</h3>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px;">
                <input type="date" id="report-date" style="width:auto;">
                <button class="btn btn-success" onclick="showReport()">Показать за дату</button>
                <button class="btn btn-primary" onclick="showTodaySales()">📅 Продажи за сегодня</button>
            </div>
            <div id="report-output"></div>
        </div>
        <div class="card">
            <button class="btn btn-secondary" onclick="showTopSales()">🏆 Топ-10 продаж</button>
            <div id="top-sales-output" style="margin-top:20px;"></div>
        </div>
    `;
                // Устанавливаем сегодняшнюю дату в поле по умолчанию
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('report-date').value = today;
            }

            else if (tabIndex === 4) {
                contentDiv.innerHTML = `<div class="card"><div id="top-sales-output"></div></div>`;
                showTopSales();
            }
            else if (tabIndex === 5 && (currentUser.role === 'owner' || currentUser.role === 'senior_manager')) {
                contentDiv.innerHTML = `<div id="users-list"></div>`;
                loadUsers();
            }
            else if (tabIndex === 6) {
                contentDiv.innerHTML = `<div id="profile-container"></div>`;
                loadProfile();
            }
        }

        function switchTab(index) {
                activeTab = index;
                document.querySelectorAll('#tab-buttons-container button').forEach(btn => {
                    const tabIdx = parseInt(btn.getAttribute('data-tab'));
                    if (tabIdx === index) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                // Обновлённый массив заголовков (без Загрузки CSV)
                const titles = ['Новый заказ', 'История заказов', 'Отчёты', 'Топ продаж', 'Управление персоналом', 'Профиль'];
                document.getElementById('tab-title').innerText = titles[index] || '';
                renderTab(index);
            }

        // Аутентификация и регистрация
        function showAuthModal() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
            <div class="modal-content">
                <span class="close" onclick="this.closest('.modal').remove()">&times;</span>
                <h3>Вход в систему</h3>
                <input type="text" id="login-username" placeholder="Логин" style="width:100%; margin-bottom:10px;"><br>
                <input type="password" id="login-password" placeholder="Пароль" style="width:100%; margin-bottom:10px;"><br>
                <button class="btn btn-success" onclick="login()">Войти</button>
                <hr style="margin:15px 0;">
                <h3>Регистрация</h3>
                <input type="text" id="reg-username" placeholder="Логин" style="width:100%; margin-bottom:5px;"><br>
                <input type="password" id="reg-password" placeholder="Пароль" style="width:100%; margin-bottom:5px;"><br>
                <input type="text" id="reg-firstname" placeholder="Имя" style="width:100%; margin-bottom:5px;"><br>
                <input type="text" id="reg-lastname" placeholder="Фамилия" style="width:100%; margin-bottom:5px;"><br>
                <input type="text" id="reg-phone" placeholder="Телефон" style="width:100%; margin-bottom:5px;"><br>
                <input type="email" id="reg-email" placeholder="Email" style="width:100%; margin-bottom:10px;"><br>
                <button class="btn btn-secondary" onclick="register()">Зарегистрироваться</button>
            </div>
        `;
            document.body.appendChild(modal);
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                location.reload();
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const first_name = document.getElementById('reg-firstname').value;
            const last_name = document.getElementById('reg-lastname').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, first_name, last_name, phone, email })
            });
            const data = await res.json();
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите.');
                document.querySelector('.modal').remove();
            } else {
                alert('Ошибка: ' + data.error);
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            location.reload();
        }

        window.onload = () => {
            checkAuth();
        };
    </script>
</body>

</html>
